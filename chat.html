<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gruppechat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f7f6f3;
      color: #111;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e4e2de;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #111;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .you-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #bbb;
      letter-spacing: .06em;
    }

    .you-label span { color: #555; }

    .leave-btn {
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      color: #bbb;
      cursor: pointer;
      text-transform: uppercase;
      transition: color .15s;
    }

    .leave-btn:hover { color: #333; }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .date-div {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #ccc;
      margin: 16px 0 8px;
      text-align: center;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 68%;
      animation: fadeUp .18s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.me {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-row.them { align-self: flex-start; }

    .msg-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #aaa;
      margin-bottom: 4px;
      padding: 0 2px;
      letter-spacing: .04em;
    }

    .msg-row.me .msg-meta { display: none; }

    .bubble {
      padding: 10px 14px;
      font-size: 14.5px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .me .bubble {
      background: #111;
      color: #f7f6f3;
    }

    .them .bubble {
      background: #fff;
      color: #111;
      border: 1px solid #e4e2de;
    }

    .mention {
      color: #0066cc;
      font-weight: 500;
    }

    .msg-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 2px;
    }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .1em;
      color: #ccc;
      text-transform: uppercase;
    }

    /* INPUT AREA */
    .input-area {
      background: #fff;
      border-top: 1px solid #e4e2de;
      padding: 12px 16px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #ddd;
      outline: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      color: #111;
      caret-color: #111;
      resize: none;
      padding-bottom: 8px;
      max-height: 100px;
      line-height: 1.45;
      transition: border-color .2s;
    }

    #msgInput::placeholder { color: #ccc; }
    #msgInput:focus { border-color: #999; }

    .icon-btn {
      background: none;
      border: none;
      font-size: 17px;
      color: #bbb;
      cursor: pointer;
      padding: 0 0 7px;
      transition: color .15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .icon-btn:hover { color: #333; }

    .send-btn {
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      color: #bbb;
      cursor: pointer;
      padding: 0 0 7px;
      transition: color .15s;
      line-height: 1;
    }

    .send-btn:hover { color: #111; }
    .send-btn:disabled { color: #ddd; cursor: not-allowed; }

    /* EMOJI PICKER */
    #emojiPicker {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 16px;
      background: #fff;
      border: 1px solid #e4e2de;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 10px;
      z-index: 20;
      width: 272px;
    }

    #emojiPicker.open { display: block; }

    .emoji-categories {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid #f0eeea;
      padding-bottom: 8px;
    }

    .emoji-cat-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 4px;
      opacity: .5;
      transition: opacity .15s, background .15s;
    }

    .emoji-cat-btn:hover,
    .emoji-cat-btn.active { opacity: 1; background: #f0eeea; }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background .1s;
      text-align: center;
    }

    .emoji-btn:hover { background: #f0eeea; }

    /* @ MENTION POPUP */
    #mentionPopup {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50px;
      background: #fff;
      border: 1px solid #e4e2de;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      z-index: 20;
      min-width: 180px;
      max-height: 220px;
      overflow-y: auto;
    }

    #mentionPopup.open { display: block; }

    .mention-header {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #aaa;
      padding: 10px 14px 6px;
      border-bottom: 1px solid #f0eeea;
    }

    .mention-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background .1s;
    }

    .mention-item:hover { background: #f7f6f3; }

    .mention-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eeecea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #666;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .mention-name {
      font-size: 14px;
      color: #111;
    }

    .mention-you {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #bbb;
      margin-left: auto;
    }

    /* Loading */
    #loadOverlay {
      position: fixed;
      inset: 0;
      background: #f7f6f3;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #ccc;
    }

    @media (max-width: 480px) {
      .msg-row { max-width: 88%; }
      .you-label { display: none; }
    }
  </style>
</head>
<body>

<div id="loadOverlay">Laster</div>

<header>
  <div class="wordmark">gruppechat</div>
  <div class="header-right">
    <div class="you-label">du er тЖТ <span id="headerName"></span></div>
    <button class="leave-btn" onclick="leave()">Forlat</button>
  </div>
</header>

<div id="messages">
  <div class="empty" id="emptyState">Ingen meldinger enn├е</div>
</div>

<!-- EMOJI PICKER -->
<div id="emojiPicker">
  <div class="emoji-categories" id="emojiCats"></div>
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<!-- MENTION POPUP -->
<div id="mentionPopup">
  <div class="mention-header">Tagg en person</div>
  <div id="mentionList"></div>
</div>

<div class="input-area">

  <button class="icon-btn" id="mentionToggle" onclick="toggleMention()" title="Tagg noen">@</button>
  <button class="send-btn" id="sendBtn" onclick="send()">тЖТ</button>
</div>

      b.className = 'emoji-btn';
      b.textContent = em;
      b.onclick = () => insertText(em);
      gridEl.appendChild(b);
    });
    document.querySelectorAll('.emoji-cat-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
  }

  EMOJI_CATS.forEach((cat, i) => {
    const b = document.createElement('button');
    b.className = 'emoji-cat-btn' + (i === 0 ? ' active' : '');
    b.textContent = cat.icon;
    b.title = cat.label;
    b.onclick = () => renderEmojiCat(i);
    catsEl.appendChild(b);
  });
  renderEmojiCat(0);

  function toggleEmoji() {
    const ep = document.getElementById('emojiPicker');
    const mp = document.getElementById('mentionPopup');
    mp.classList.remove('open');
    ep.classList.toggle('open');
  }

  function toggleMention() {
    const mp = document.getElementById('mentionPopup');
    const ep = document.getElementById('emojiPicker');
    ep.classList.remove('open');
    buildMentionList();
    mp.classList.toggle('open');
  }

  function buildMentionList() {
    const list = document.getElementById('mentionList');
    list.innerHTML = '';
    const users = Object.values(knownUsers);
    if (users.length === 0) {
      const el = document.createElement('div');
      el.style.cssText = 'padding:12px 14px;font-size:13px;color:#aaa;font-family:IBM Plex Mono,monospace;';
      el.textContent = 'Ingen andre her enn├е';
      list.appendChild(el);
      return;
    }
    users.forEach(u => {
      const isMe = u.uid === myUid;
      const item = document.createElement('div');
      item.className = 'mention-item';
      item.innerHTML = `
        <div class="mention-avatar">${u.name.slice(0,2)}</div>
        <span class="mention-name">${escHtml(u.name)}</span>
        ${isMe ? '<span class="mention-you">deg</span>' : ''}
      `;
      if (!isMe) {
        item.onclick = () => {
          insertText('@' + u.name + ' ');
          document.getElementById('mentionPopup').classList.remove('open');
        };
      }
      list.appendChild(item);
    });
  }

  function insertText(str) {
    const input = document.getElementById('msgInput');
    const start = input.selectionStart;
    const end   = input.selectionEnd;
    const val   = input.value;
    input.value = val.slice(0, start) + str + val.slice(end);
    const pos = start + str.length;
    input.setSelectionRange(pos, pos);
    input.focus();
    resize(input);
  }

  /* Close popups on outside click */
  document.addEventListener('click', e => {
    const ep = document.getElementById('emojiPicker');
    const mp = document.getElementById('mentionPopup');
    if (!ep.contains(e.target) && e.target.id !== 'emojiToggle') ep.classList.remove('open');
    if (!mp.contains(e.target) && e.target.id !== 'mentionToggle') mp.classList.remove('open');
  });

  /* тФАтФАтФА AUTH + FIRESTORE тФАтФАтФА */
  auth.onAuthStateChanged(u => {
    if (!u) { window.location.href = 'index.html'; return; }
    myUid = u.uid;
    document.getElementById('loadOverlay').style.display = 'none';
    listen();
  });

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
  }

  function dateLabel(ts) {
    if (!ts) return null;
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const today     = new Date();
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === today.toDateString())     return 'i dag';
    if (d.toDateString() === yesterday.toDateString()) return 'i g├еr';
    return d.toLocaleDateString('no-NO', { day: 'numeric', month: 'long' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderText(s) {
    return escHtml(s).replace(/@(\S+)/g, '<span class="mention">@$1</span>');
  }

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function addMessage(doc) {
    const data = doc.data();
    const msgs = document.getElementById('messages');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    if (data.uid && data.name) {
      knownUsers[data.uid] = { uid: data.uid, name: data.name };
    }

    const dl = dateLabel(data.timestamp);
    if (dl && dl !== lastDate) {
      lastDate = dl;
      const div = document.createElement('div');
      div.className = 'date-div';
      div.textContent = dl;
      msgs.appendChild(div);
    }

    const isMe = data.uid === myUid;
    const row  = document.createElement('div');
    row.className = 'msg-row ' + (isMe ? 'me' : 'them');
    row.dataset.id = doc.id;

    row.innerHTML = `
      ${!isMe ? `<div class="msg-meta">${escHtml(data.name || '?')}</div>` : ''}
      <div class="bubble">${renderText(data.text || '')}</div>
      <div class="msg-time">${formatTime(data.timestamp)}</div>
    `;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function listen() {
    if (unsub) unsub();
    unsub = db.collection('messages')
      .orderBy('timestamp', 'asc')
      .limitToLast(120)
      .onSnapshot(snap => {
        snap.docChanges().forEach(ch => {
          if (ch.type === 'added' && !document.querySelector(`[data-id="${ch.doc.id}"]`)) {
            addMessage(ch.doc);
          }
        });
      });
  }

  async function send() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text || !myUid) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('emojiPicker').classList.remove('open');
    document.getElementById('mentionPopup').classList.remove('open');

    try {
      await db.collection('messages').add({
        text,
        name:      chatName,
        uid:       myUid,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (e) {
      console.error(e);
    }
  }

  function leave() {
    if (unsub) unsub();
    localStorage.removeItem('chatName');
    auth.signOut().then(() => { window.location.href = 'index.html'; });
  }

  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
