<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gruppechat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f7f6f3;
      color: #111;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e4e2de;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #111;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .you-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #bbb;
      letter-spacing: .06em;
    }

    .you-label span { color: #555; }

    .leave-btn {
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      color: #bbb;
      cursor: pointer;
      text-transform: uppercase;
      transition: color .15s;
    }

    .leave-btn:hover { color: #333; }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .date-div {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #ccc;
      margin: 16px 0 8px;
      text-align: center;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 68%;
      animation: fadeUp .18s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.me {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-row.them { align-self: flex-start; }

    .msg-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #aaa;
      margin-bottom: 4px;
      padding: 0 2px;
      letter-spacing: .04em;
    }

    .msg-row.me .msg-meta { display: none; }

    .bubble {
      padding: 10px 14px;
      font-size: 14.5px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .me .bubble {
      background: #111;
      color: #f7f6f3;
    }

    .them .bubble {
      background: #fff;
      color: #111;
      border: 1px solid #e4e2de;
    }

    .mention {
      color: #0066cc;
      font-weight: 500;
    }

    .msg-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 2px;
    }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .1em;
      color: #ccc;
      text-transform: uppercase;
    }

    /* INPUT AREA */
    .input-area {
      background: #fff;
      border-top: 1px solid #e4e2de;
      padding: 12px 16px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #ddd;
      outline: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      color: #111;
      caret-color: #111;
      resize: none;
      padding-bottom: 8px;
      max-height: 100px;
      line-height: 1.45;
      transition: border-color .2s;
    }

    #msgInput::placeholder { color: #ccc; }
    #msgInput:focus { border-color: #999; }

    .icon-btn {
      background: none;
      border: none;
      font-size: 17px;
      color: #bbb;
      cursor: pointer;
      padding: 0 0 7px;
      transition: color .15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .icon-btn:hover { color: #333; }

    .send-btn {
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      color: #bbb;
      cursor: pointer;
      padding: 0 0 7px;
      transition: color .15s;
      line-height: 1;
    }

    .send-btn:hover { color: #111; }
    .send-btn:disabled { color: #ddd; cursor: not-allowed; }

    /* EMOJI PICKER */
    #emojiPicker {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 16px;
      background: #fff;
      border: 1px solid #e4e2de;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 10px;
      z-index: 20;
      width: 272px;
    }

    #emojiPicker.open { display: block; }

    .emoji-categories {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid #f0eeea;
      padding-bottom: 8px;
    }

    .emoji-cat-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 4px;
      opacity: .5;
      transition: opacity .15s, background .15s;
    }

    .emoji-cat-btn:hover,
    .emoji-cat-btn.active { opacity: 1; background: #f0eeea; }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background .1s;
      text-align: center;
    }

    .emoji-btn:hover { background: #f0eeea; }

    /* @ MENTION POPUP */
    #mentionPopup {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 16px;
      background: #fff;
      border: 1px solid #e4e2de;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      z-index: 20;
      min-width: 200px;
      max-height: 240px;
      overflow-y: auto;
    }

    #mentionPopup.open { display: block; }

    .mention-header {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #aaa;
      padding: 10px 14px 6px;
      border-bottom: 1px solid #f0eeea;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mention-filter-tag {
      background: #f0eeea;
      font-size: 10px;
      padding: 2px 6px;
      color: #666;
      border-radius: 2px;
    }

    .mention-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background .1s;
    }

    .mention-item:hover { background: #f7f6f3; }

    .mention-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eeecea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #666;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .mention-avatar.active-dot {
      position: relative;
    }

    .mention-avatar.active-dot::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      border: 1.5px solid #fff;
    }

    .mention-name {
      font-size: 14px;
      color: #111;
    }

    .mention-you {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #bbb;
      margin-left: auto;
    }

    /* Loading */
    #loadOverlay {
      position: fixed;
      inset: 0;
      background: #f7f6f3;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #ccc;
    }

    /* TOAST POPUP */
    #toastPopup {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #111;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .06em;
      padding: 10px 18px;
      z-index: 100;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toastPopup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* PIN OVERLAY */
    #pinOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(247,246,243,0.96);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #pinOverlay.open { display: flex; }

    .pin-card {
      background: #fff;
      border: 1px solid #e4e2de;
      padding: 40px 36px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    .pin-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 24px;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      background: transparent;
      transition: background .15s, border-color .15s;
    }

    .pin-dot.filled {
      background: #111;
      border-color: #111;
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .pin-key {
      background: #f7f6f3;
      border: 1px solid #e4e2de;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      padding: 14px;
      cursor: pointer;
      transition: background .1s;
      color: #111;
    }

    .pin-key:hover { background: #eeecea; }
    .pin-key:active { background: #ddd; }

    .pin-key.del {
      font-size: 14px;
      color: #aaa;
    }

    .pin-err {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #c0392b;
      letter-spacing: .04em;
      min-height: 18px;
    }

    .pin-cancel {
      margin-top: 14px;
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb;
      cursor: pointer;
    }

    .pin-cancel:hover { color: #333; }

    /* ADMIN PANEL */
    #adminPanel {
      display: none;
      position: fixed;
      inset: 0;
      background: #f7f6f3;
      z-index: 210;
      flex-direction: column;
    }

    #adminPanel.open { display: flex; }

    .admin-header {
      background: #fff;
      border-bottom: 1px solid #e4e2de;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .admin-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #111;
    }

    .admin-close {
      background: none;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb;
      cursor: pointer;
    }

    .admin-close:hover { color: #333; }

    .admin-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .admin-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .admin-stat {
      background: #fff;
      border: 1px solid #e4e2de;
      padding: 16px 20px;
      flex: 1;
    }

    .admin-stat-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      color: #111;
      line-height: 1;
      margin-bottom: 6px;
    }

    .admin-stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #aaa;
    }

    .admin-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
      margin-top: 20px;
    }

    .admin-section-title:first-of-type { margin-top: 0; }

    .admin-user-row {
      background: #fff;
      border: 1px solid #e4e2de;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .admin-user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eeecea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      text-transform: uppercase;
      flex-shrink: 0;
      position: relative;
    }

    .admin-user-avatar .status-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .status-dot.online { background: #2ecc71; }
    .status-dot.offline { background: #ddd; }

    .admin-user-info { flex: 1; }

    .admin-user-name {
      font-size: 14px;
      font-weight: 500;
      color: #111;
      margin-bottom: 2px;
    }

    .admin-user-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #bbb;
      letter-spacing: .04em;
    }

    .admin-status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 8px;
    }

    .admin-status-badge.online { color: #2ecc71; background: #f0fff6; border: 1px solid #c3f0d4; }
    .admin-status-badge.offline { color: #bbb; background: #f7f6f3; border: 1px solid #e4e2de; }

    @media (max-width: 480px) {
      .msg-row { max-width: 88%; }
      .you-label { display: none; }
      .admin-stats { flex-direction: column; }
    }
  </style>
</head>
<body>

<div id="loadOverlay">Laster</div>

<!-- TOAST -->
<div id="toastPopup"></div>

<!-- PIN OVERLAY -->
<div id="pinOverlay">
  <div class="pin-card">
    <div class="pin-title">Dev-tilgang — skriv inn PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinKey('del')">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinKey('clr')">✕</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <button class="pin-cancel" onclick="closePinOverlay()">Avbryt</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-title">dev — brukeroversikt</div>
    <button class="admin-close" onclick="closeAdminPanel()">✕ Lukk</button>
  </div>
  <div class="admin-body" id="adminBody">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#bbb;letter-spacing:.1em;">Laster brukere…</div>
  </div>
</div>

<header>
  <div class="wordmark">gruppechat</div>
  <div class="header-right">
    <div class="you-label">du er → <span id="headerName"></span></div>
    <button class="leave-btn" onclick="leave()">Forlat</button>
  </div>
</header>

<div id="messages">
  <div class="empty" id="emptyState">Ingen meldinger ennå</div>
</div>

<!-- EMOJI PICKER -->
<div id="emojiPicker">
  <div class="emoji-categories" id="emojiCats"></div>
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<!-- MENTION POPUP -->
<div id="mentionPopup">
  <div class="mention-header">
    <span>Tagg en person</span>
    <span class="mention-filter-tag" id="mentionFilterTag" style="display:none;"></span>
  </div>
  <div id="mentionList"></div>
</div>

<div class="input-area">
  <textarea id="msgInput" placeholder="Skriv noe…" rows="1" oninput="handleInput(this)"></textarea>
  <button class="icon-btn" id="emojiToggle" onclick="toggleEmoji()" title="Legg til emoji">☺</button>
  <button class="icon-btn" id="mentionToggle" onclick="toggleMentionBtn()" title="Tagg noen">@</button>
  <button class="send-btn" id="sendBtn" onclick="send()">→</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  const chatName = localStorage.getItem('chatName');
  if (!chatName) window.location.href = 'index.html';
  document.getElementById('headerName').textContent = chatName;

  let myUid       = null;
  let unsub       = null;
  let unsubUsers  = null;
  let lastDate    = null;
  let activeUsers = {};   // uid -> {uid, name} — currently online
  let allUsers    = {};   // uid -> {uid, name, active, lastSeen} — ever registered

  /* ─── MENTION STATE ─── */
  let mentionState = { active: false, atPos: -1, query: '' };

  /* ─── EMOJI DATA ─── */
  const EMOJI_CATS = [
    { icon: '😀', label: 'Smiley', emojis: ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕'] },
    { icon: '👋', label: 'Folk',   emojis: ['👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🤲','🤝','🙏','💪','🦵','🦶','👂','🦻','👃','🧠','🦷','🦴','👀','👁','👅','👄','💋','🫀','🫁','🧬','🦠','👶','🧒','👦','👧','🧑','👱','👨','🧔','👩','🧓','👴','👵','🙍','🙎','🙅','🙆','💁','🙋','🧏','🙇','🤦','🤷'] },
    { icon: '🐶', label: 'Dyr',    emojis: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🦟','🦗','🐢','🐍','🦎','🦖','🦕','🐙','🦑','🦐','🦞','🦀','🐡','🐠','🐟','🐬','🐳','🐋','🦈','🐊','🐅','🐆','🦓','🦍','🦧','🦣','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🦬','🐃','🐂','🐄','🐎','🐖','🐏','🐑','🦙','🐐','🦌','🐕','🐩','🦮','🐈','🐈‍⬛','🪶','🐓','🦃','🦤','🦚','🦜','🦢','🦩','🕊','🐇','🦝','🦨','🦡','🦦','🦥','🐁','🐀','🐿','🦔'] },
    { icon: '🍕', label: 'Mat',    emojis: ['🍕','🍔','🌭','🌮','🌯','🥙','🧆','🥚','🍳','🥘','🍲','🥣','🥗','🍿','🧈','🧂','🥫','🍱','🍘','🍙','🍚','🍛','🍜','🍝','🍠','🍢','🍣','🍤','🍥','🥮','🍡','🥟','🥠','🥡','🍦','🍧','🍨','🍩','🍪','🎂','🍰','🧁','🥧','🍫','🍬','🍭','🍮','🍯','🍼','🥛','☕','🫖','🍵','🧃','🥤','🧋','🍶','🍾','🍷','🍸','🍹','🍺','🍻','🥂','🥃','🫗'] },
    { icon: '⚽', label: 'Sport',  emojis: ['⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🥏','🎱','🏓','🏸','🏒','🏑','🥍','🏏','🪃','🥅','⛳','🪁','🎣','🤿','🎽','🎿','🛷','🥌','🎯','🪀','🪆','🎮','🎲','🎭','🎨','🎬','🎤','🎧','🎼','🎹','🥁','🪘','🎷','🎺','🎸','🪕','🎻','🪗','🎪'] },
    { icon: '🌍', label: 'Reise',  emojis: ['🌍','🌎','🌏','🌐','🗺','🧭','🏔','⛰','🌋','🗻','🏕','🏖','🏜','🏝','🏞','🏟','🏛','🏗','🧱','🏘','🏚','🏠','🏡','🏢','🏣','🏤','🏥','🏦','🏨','🏩','🏪','🏫','🏬','🏭','🏯','🏰','💒','🗼','🗽','⛪','🕌','🛕','🕍','⛩','🕋','⛲','⛺','🌁','🌃','🏙','🌄','🌅','🌆','🌇','🌉','♨️','🎠','🎡','🎢','💈','🎪'] },
    { icon: '❤️', label: 'Symboler', emojis: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','☮️','✝️','☯️','🕉','✡️','☸️','🔯','🛐','⛎','🆚','🆗','🆕','🆙','🆒','🆓','🆖','📵','🚫','🚳','🚭','🚯','🚱','🚷','📛','⛔','✅','❎','💯','❓','❗','💤','🔔','🔕','🔇','🔈','🔉','🔊','📢','📣','🔔','✨','🎉','🎊','🎈','🎁','🎀','🎗','🏆','🥇','🥈','🥉','🏅','🎖','🎗'] },
  ];

  /* Build emoji picker */
  const catsEl = document.getElementById('emojiCats');
  const gridEl = document.getElementById('emojiGrid');
  let activeEmojiCat = 0;

  function renderEmojiCat(idx) {
    activeEmojiCat = idx;
    gridEl.innerHTML = '';
    EMOJI_CATS[idx].emojis.forEach(em => {
      const b = document.createElement('button');
      b.className = 'emoji-btn';
      b.textContent = em;
      b.onclick = () => { insertText(em); };
      gridEl.appendChild(b);
    });
    document.querySelectorAll('.emoji-cat-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
  }

  EMOJI_CATS.forEach((cat, i) => {
    const b = document.createElement('button');
    b.className = 'emoji-cat-btn' + (i === 0 ? ' active' : '');
    b.textContent = cat.icon;
    b.title = cat.label;
    b.onclick = () => renderEmojiCat(i);
    catsEl.appendChild(b);
  });
  renderEmojiCat(0);

  function toggleEmoji() {
    const ep = document.getElementById('emojiPicker');
    const mp = document.getElementById('mentionPopup');
    mp.classList.remove('open');
    mentionState = { active: false, atPos: -1, query: '' };
    ep.classList.toggle('open');
  }

  /* @ button: insert @ at cursor and open mention popup */
  function toggleMentionBtn() {
    const ep = document.getElementById('emojiPicker');
    ep.classList.remove('open');
    const input = document.getElementById('msgInput');
    const pos = input.selectionStart;
    const val = input.value;
    input.value = val.slice(0, pos) + '@' + val.slice(pos);
    const newPos = pos + 1;
    input.setSelectionRange(newPos, newPos);
    input.focus();
    resize(input);
    // Trigger mention detection
    mentionState = { active: true, atPos: pos, query: '' };
    buildMentionPopup('');
    document.getElementById('mentionPopup').classList.add('open');
  }

  /* Build/filter the mention popup */
  function buildMentionPopup(query) {
    const list = document.getElementById('mentionList');
    const filterTag = document.getElementById('mentionFilterTag');
    list.innerHTML = '';

    if (query) {
      filterTag.style.display = 'inline';
      filterTag.textContent = '@' + query;
    } else {
      filterTag.style.display = 'none';
    }

    const users = Object.values(activeUsers).filter(u => u.uid !== myUid);
    const filtered = query
      ? users.filter(u => u.name.toLowerCase().startsWith(query.toLowerCase()))
      : users;

    if (filtered.length === 0) {
      const el = document.createElement('div');
      el.style.cssText = 'padding:12px 14px;font-size:13px;color:#aaa;font-family:IBM Plex Mono,monospace;letter-spacing:.04em;';
      el.textContent = query ? `Ingen bruker matcher "@${query}"` : 'Ingen andre er her nå';
      list.appendChild(el);
      return;
    }

    filtered.forEach(u => {
      const item = document.createElement('div');
      item.className = 'mention-item';
      item.innerHTML = `
        <div class="mention-avatar active-dot">${escHtml(u.name.slice(0,2))}</div>
        <span class="mention-name">${escHtml(u.name)}</span>
      `;
      item.onclick = () => selectMention(u.name);
      list.appendChild(item);
    });
  }

  function selectMention(name) {
    const input = document.getElementById('msgInput');
    const val = input.value;
    if (mentionState.active && mentionState.atPos >= 0) {
      // Replace @query with @name
      const before = val.slice(0, mentionState.atPos);
      // Find end of @query: from atPos, skip @ and word chars
      let end = mentionState.atPos + 1 + mentionState.query.length;
      const after = val.slice(end);
      input.value = before + '@' + name + ' ' + after;
      const newPos = mentionState.atPos + name.length + 2;
      input.setSelectionRange(newPos, newPos);
    } else {
      insertText('@' + name + ' ');
    }
    mentionState = { active: false, atPos: -1, query: '' };
    document.getElementById('mentionPopup').classList.remove('open');
    input.focus();
    resize(input);
  }

  function insertText(str) {
    const input = document.getElementById('msgInput');
    const start = input.selectionStart;
    const end   = input.selectionEnd;
    const val   = input.value;
    input.value = val.slice(0, start) + str + val.slice(end);
    const pos = start + str.length;
    input.setSelectionRange(pos, pos);
    input.focus();
    resize(input);
  }

  /* Handle textarea input — detect @mention typing */
  function handleInput(el) {
    resize(el);
    const val = el.value;
    const pos = el.selectionStart;
    const before = val.slice(0, pos);
    const m = before.match(/@(\w*)$/);
    if (m) {
      const atIdx = before.lastIndexOf('@');
      mentionState = { active: true, atPos: atIdx, query: m[1] };
      buildMentionPopup(m[1]);
      document.getElementById('mentionPopup').classList.add('open');
      document.getElementById('emojiPicker').classList.remove('open');
    } else {
      mentionState = { active: false, atPos: -1, query: '' };
      document.getElementById('mentionPopup').classList.remove('open');
    }
  }

  /* Close popups on outside click */
  document.addEventListener('click', e => {
    const ep = document.getElementById('emojiPicker');
    const mp = document.getElementById('mentionPopup');
    if (!ep.contains(e.target) && e.target.id !== 'emojiToggle') ep.classList.remove('open');
    if (!mp.contains(e.target) && e.target.id !== 'mentionToggle' && e.target.id !== 'msgInput') {
      mp.classList.remove('open');
      mentionState = { active: false, atPos: -1, query: '' };
    }
  });

  /* ─── TOAST ─── */
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toastPopup');
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }

  /* ─── PIN SCREEN ─── */
  const CORRECT_PIN = '8986';
  let pinValue = '';

  function showPinScreen() {
    pinValue = '';
    updatePinDots();
    document.getElementById('pinErr').textContent = '';
    document.getElementById('pinOverlay').classList.add('open');
  }

  function closePinOverlay() {
    document.getElementById('pinOverlay').classList.remove('open');
    pinValue = '';
    updatePinDots();
  }

  function pinKey(k) {
    if (k === 'del') {
      pinValue = pinValue.slice(0, -1);
    } else if (k === 'clr') {
      pinValue = '';
    } else {
      if (pinValue.length >= 4) return;
      pinValue += k;
    }
    updatePinDots();
    document.getElementById('pinErr').textContent = '';
    if (pinValue.length === 4) checkPin();
  }

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('pd' + i).classList.toggle('filled', i < pinValue.length);
    }
  }

  function checkPin() {
    if (pinValue === CORRECT_PIN) {
      closePinOverlay();
      openAdminPanel();
    } else {
      document.getElementById('pinErr').textContent = 'Feil PIN. Prøv igjen.';
      pinValue = '';
      updatePinDots();
    }
  }

  /* ─── ADMIN PANEL ─── */
  function openAdminPanel() {
    document.getElementById('adminPanel').classList.add('open');
    renderAdminPanel();
  }

  function closeAdminPanel() {
    document.getElementById('adminPanel').classList.remove('open');
  }

  async function renderAdminPanel() {
    const body = document.getElementById('adminBody');
    body.innerHTML = '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:#bbb;letter-spacing:.1em;">Laster brukere…</div>';
    try {
      const snap = await db.collection('users').get();
      const users = [];
      snap.forEach(doc => users.push(doc.data()));
      users.sort((a, b) => (b.active ? 1 : 0) - (a.active ? 1 : 0) || (a.name || '').localeCompare(b.name || ''));

      const online  = users.filter(u => u.active);
      const offline = users.filter(u => !u.active);

      body.innerHTML = '';

      // Stats
      const stats = document.createElement('div');
      stats.className = 'admin-stats';
      stats.innerHTML = `
        <div class="admin-stat">
          <div class="admin-stat-num">${users.length}</div>
          <div class="admin-stat-label">Totalt registrert</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-num">${online.length}</div>
          <div class="admin-stat-label">Aktive nå</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-num">${offline.length}</div>
          <div class="admin-stat-label">Ikke tilstede</div>
        </div>
      `;
      body.appendChild(stats);

      function renderUserGroup(title, list, statusClass) {
        if (list.length === 0) return;
        const t = document.createElement('div');
        t.className = 'admin-section-title';
        t.textContent = title;
        body.appendChild(t);
        list.forEach(u => {
          const row = document.createElement('div');
          row.className = 'admin-user-row';
          const initials = (u.name || '?').slice(0, 2).toUpperCase();
          const lastSeen = u.lastSeen
            ? (u.lastSeen.toDate ? u.lastSeen.toDate() : new Date(u.lastSeen)).toLocaleString('no-NO', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
            : '—';
          row.innerHTML = `
            <div class="admin-user-avatar">
              ${escHtml(initials)}
              <span class="status-dot ${statusClass}"></span>
            </div>
            <div class="admin-user-info">
              <div class="admin-user-name">${escHtml(u.name || '?')}</div>
              <div class="admin-user-meta">${u.active ? 'Aktiv nå' : 'Sist sett: ' + lastSeen}</div>
            </div>
            <span class="admin-status-badge ${statusClass}">${u.active ? 'Online' : 'Offline'}</span>
          `;
          body.appendChild(row);
        });
      }

      renderUserGroup('Aktive brukere', online, 'online');
      renderUserGroup('Tidligere brukere', offline, 'offline');

    } catch (e) {
      body.innerHTML = '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:#c0392b;">Feil ved lasting av brukere.</div>';
      console.error(e);
    }
  }

  /* ─── AUTH + FIRESTORE ─── */
  auth.onAuthStateChanged(u => {
    if (!u) { window.location.href = 'index.html'; return; }
    myUid = u.uid;

    // Register / update user as active
    db.collection('users').doc(myUid).set({
      uid:      myUid,
      name:     chatName,
      active:   true,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    document.getElementById('loadOverlay').style.display = 'none';
    listenUsers();
    listen();
  });

  /* Mark inactive on leave */
  function markInactive() {
    if (myUid) {
      navigator.sendBeacon
        ? db.collection('users').doc(myUid).update({ active: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {})
        : db.collection('users').doc(myUid).update({ active: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {});
    }
  }

  window.addEventListener('beforeunload', markInactive);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') markInactive();
    else if (myUid) {
      db.collection('users').doc(myUid).update({ active: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {});
    }
  });

  function listenUsers() {
    if (unsubUsers) unsubUsers();
    unsubUsers = db.collection('users').onSnapshot(snap => {
      activeUsers = {};
      allUsers = {};
      snap.forEach(doc => {
        const d = doc.data();
        allUsers[d.uid] = d;
        if (d.active) activeUsers[d.uid] = d;
      });
    });
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
  }

  function dateLabel(ts) {
    if (!ts) return null;
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const today     = new Date();
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === today.toDateString())     return 'i dag';
    if (d.toDateString() === yesterday.toDateString()) return 'i går';
    return d.toLocaleDateString('no-NO', { day: 'numeric', month: 'long' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* Only color @mention blue if user exists in allUsers */
  function renderText(s) {
    return escHtml(s).replace(/@(\S+)/g, (match, name) => {
      const exists = Object.values(allUsers).some(u => u.name === name);
      return exists
        ? `<span class="mention">@${escHtml(name)}</span>`
        : `@${escHtml(name)}`;
    });
  }

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function addMessage(doc) {
    const data = doc.data();
    const msgs = document.getElementById('messages');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const dl = dateLabel(data.timestamp);
    if (dl && dl !== lastDate) {
      lastDate = dl;
      const div = document.createElement('div');
      div.className = 'date-div';
      div.textContent = dl;
      msgs.appendChild(div);
    }

    const isMe = data.uid === myUid;
    const row  = document.createElement('div');
    row.className = 'msg-row ' + (isMe ? 'me' : 'them');
    row.dataset.id = doc.id;

    row.innerHTML = `
      ${!isMe ? `<div class="msg-meta">${escHtml(data.name || '?')}</div>` : ''}
      <div class="bubble">${renderText(data.text || '')}</div>
      <div class="msg-time">${formatTime(data.timestamp)}</div>
    `;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function listen() {
    if (unsub) unsub();
    unsub = db.collection('messages')
      .orderBy('timestamp', 'asc')
      .limitToLast(120)
      .onSnapshot(snap => {
        snap.docChanges().forEach(ch => {
          if (ch.type === 'added' && !document.querySelector(`[data-id="${ch.doc.id}"]`)) {
            addMessage(ch.doc);
          }
        });
      });
  }

  async function send() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text || !myUid) return;

    // Dev command
    if (text === 'dev/pin/g') {
      input.value = '';
      input.style.height = 'auto';
      showPinScreen();
      return;
    }

    // Validate @mentions — only currently active users
    const mentionMatches = [...text.matchAll(/@(\S+)/g)];
    for (const m of mentionMatches) {
      const name = m[1];
      const existsActive = Object.values(activeUsers).some(u => u.name === name);
      const existsAtAll  = Object.values(allUsers).some(u => u.name === name);
      if (!existsAtAll) {
        showToast(`@${name} finnes ikke`);
        return;
      }
      if (!existsActive) {
        showToast(`@${name} er ikke i chatten akkurat nå`);
        return;
      }
    }

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('emojiPicker').classList.remove('open');
    document.getElementById('mentionPopup').classList.remove('open');
    mentionState = { active: false, atPos: -1, query: '' };

    try {
      await db.collection('messages').add({
        text,
        name:      chatName,
        uid:       myUid,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (e) {
      console.error(e);
      showToast('Feil ved sending. Prøv igjen.');
    }
  }

  function leave() {
    markInactive();
    if (unsub) unsub();
    if (unsubUsers) unsubUsers();
    localStorage.removeItem('chatName');
    auth.signOut().then(() => { window.location.href = 'index.html'; });
  }

  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    // Close mention popup on Escape
    if (e.key === 'Escape') {
      document.getElementById('mentionPopup').classList.remove('open');
      document.getElementById('emojiPicker').classList.remove('open');
      mentionState = { active: false, atPos: -1, query: '' };
    }
    // Navigate mention list with arrow keys
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      const mp = document.getElementById('mentionPopup');
      if (mp.classList.contains('open')) {
        e.preventDefault();
        const items = mp.querySelectorAll('.mention-item');
        if (items.length === 0) return;
        const focused = mp.querySelector('.mention-item:focus');
        if (!focused) { items[0].focus(); return; }
        const idx = [...items].indexOf(focused);
        const next = e.key === 'ArrowDown' ? items[idx + 1] : items[idx - 1];
        if (next) next.focus();
      }
    }
  });

  // Allow Enter on mention items
  document.getElementById('mentionPopup').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const focused = document.querySelector('#mentionPopup .mention-item:focus');
      if (focused) { e.preventDefault(); focused.click(); }
    }
  });
</script>
</body>
